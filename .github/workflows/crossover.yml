name: MA Crossover

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 1-5'  # 21:00 UTC = 5pm EDT / 4pm EST, after the US close, weekdays

concurrency:
  group: crossover
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run crossover script
        run: python3 scripts/crossover.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crossover-result.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update crossover results"
          # The digest routines also push to this branch; rebase-retry instead of failing.
          for i in 1 2 3 4; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt $i), rebasing on latest ${GITHUB_REF_NAME}..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
          git push origin "HEAD:${GITHUB_REF_NAME}"
