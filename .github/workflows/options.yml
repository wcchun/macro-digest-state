name: Options Chain

on:
  workflow_dispatch:
  schedule:
    - cron: '45 20 * * 1-5'  # 20:45 UTC = 4:45pm EDT, after options data settles, weekdays

concurrency:
  group: options
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch options snapshot
        run: python3 scripts/options_snapshot.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add options-result.json iv-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update options snapshot and IV history"
          # The digest routines also push to this branch; rebase-retry instead of failing.
          for i in 1 2 3 4; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt $i), rebasing on latest ${GITHUB_REF_NAME}..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
          git push origin "HEAD:${GITHUB_REF_NAME}"
